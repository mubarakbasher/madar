# Production overlay. Merged with the base docker-compose.yml via:
#   docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml --env-file .env.production up -d
#
# Layers on top of the base compose:
#   - Removes the dev-only postgres/redis port forwards (services talk via the
#     bridge network, never exposed to the host).
#   - Adds caddy reverse proxy with auto-HTTPS via Let's Encrypt.
#   - Adds api/web/admin services (built from the repo).
#   - Pins restart policy to `always` for everything.
#   - Picks the `backup` profile so nightly Postgres snapshots run.
#
# Required env (see .env.production.example):
#   TENANT_HOST, ADMIN_HOST, API_HOST, CADDY_ACME_EMAIL
#   POSTGRES_PASSWORD, JWT_TENANT_SECRET, JWT_ADMIN_SECRET, ...

services:
  postgres:
    restart: always
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-madar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: madar

  redis:
    restart: always
    ports: !reset []

  minio:
    restart: always
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: madar_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-madar}@postgres:5432/madar
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: madar_web
    restart: always
    depends_on:
      - api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production

  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile.admin
    container_name: madar_admin
    restart: always
    depends_on:
      - api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production

  caddy:
    image: caddy:2
    container_name: madar_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - madar_caddy_data:/data
      - madar_caddy_config:/config
    environment:
      TENANT_HOST: ${TENANT_HOST:?TENANT_HOST is required}
      ADMIN_HOST: ${ADMIN_HOST:?ADMIN_HOST is required}
      API_HOST: ${API_HOST:?API_HOST is required}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required}
    depends_on:
      - api
      - web
      - admin

  backup:
    profiles: ["backup", "default"]
    restart: always

volumes:
  madar_caddy_data:
  madar_caddy_config:
