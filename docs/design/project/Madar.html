<style>
  /* small global animation utilities */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInEnd { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  [dir="rtl"] @keyframes slideInEnd { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .dot-anim {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-3);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot-anim:nth-child(2) { animation-delay: .2s; }
  .dot-anim:nth-child(3) { animation-delay: .4s; }
  .delta em { font-style: normal; }

  /* scrollbar */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
  *::-webkit-scrollbar-thumb:hover { background: var(--ink-4); border: 2px solid transparent; background-clip: content-box; }
</style>
</head>
